<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #10B981; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; }
        .session-info { background-color: white; padding: 15px; margin: 15px 0; border-left: 4px solid #10B981; }
        .button { display: inline-block; padding: 12px 24px; background-color: #10B981; color: white; text-decoration: none; border-radius: 5px; margin: 15px 0; font-weight: bold; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Session Started!</h1>
        </div>
        <div class="content">
            <p>Hello {{ participant.username }},</p>
            
            <p>The video session has started!</p>
            
            <div class="session-info">
                <h2>{{ session.title }}</h2>
                <p><strong>Host:</strong> {{ host.username }}</p>
            </div>
            
            <p style="text-align: center;">
                <a href="{{ join_url }}" class="button">Join Session Now</a>
            </p>
        </div>
        <div class="footer">
            <p>MetLab Education - Video Chat System</p>
        </div>
    </div>
</body>
</html>
