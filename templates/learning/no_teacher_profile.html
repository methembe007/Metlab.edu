{% extends 'base.html' %}

{% block title %}Teacher Profile Required{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-6 text-center">

        <a href="{% url 'accounts:teacher_dashboard' %}" class="inline-block px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
            Go to Dashboard
        </a>
    </div>
</div>
