{% extends 'base.html' %}

{% block title %}Quiz Analytics - Metlab.edu{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Quiz Analytics</h1>
                    <p class="mt-2 text-gray-600">View student performance on this quiz</p>
                </div>
                <a href="{% url 'learning:teacher_quiz_list' %}" class="text-blue-600 hover:text-blue-800">
                    ← Back to Quizzes
                </a>
            </div>
        </div>

        <!-- Analytics Dashboard -->
        <div class="bg-white shadow-sm rounded-lg p-6">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">Performance Overview</h2>
            <p class="text-gray-600">Quiz analytics and student performance data will appear here.</p>
        </div>
    </div>
</div>
{% endblock %}
