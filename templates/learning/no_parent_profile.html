{% extends 'base.html' %}

{% block title %}Parent Profile Required{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-6 text-center">
        <div class="mb-4">
            <svg class="w-16 h-16 text-gray-400 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"></path>
            </svg>
        </div>
        <h2 class="text-xl font-semibold text-gray-900 mb-2">Parent Profile Required</h2>
        <p class="text-gray-600 mb-4">You need a parent profile to access children's analytics.</p>
        <a href="{% url 'accounts:parent_dashboard' %}" class="inline-block px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
