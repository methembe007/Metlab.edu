version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: metlab-postgres
    environment:
      POSTGRES_DB: metlab
      POSTGRES_USER: metlab
      POSTGRES_PASSWORD: metlab_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metlab"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metlab-network

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: metlab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - metlab-network

  # MinIO for S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: metlab-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - metlab-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: infrastructure/docker/auth.Dockerfile
    container_name: metlab-auth
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: metlab
      DATABASE_USER: metlab
      DATABASE_PASSWORD: metlab_dev_password
      JWT_SECRET: dev_jwt_secret_change_in_production
      GRPC_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metlab-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/api-gateway.Dockerfile
    container_name: metlab-api-gateway
    environment:
      AUTH_SERVICE_URL: auth-service:50051
      VIDEO_SERVICE_URL: video-service:50052
      HOMEWORK_SERVICE_URL: homework-service:50053
      ANALYTICS_SERVICE_URL: analytics-service:50054
      COLLABORATION_SERVICE_URL: collaboration-service:50055
      PDF_SERVICE_URL: pdf-service:50056
      HTTP_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - redis
    networks:
      - metlab-network
    restart: unless-stopped

  # Video Service
  video-service:
    build:
      context: .
      dockerfile: infrastructure/docker/video.Dockerfile
    container_name: metlab-video
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: metlab
      DATABASE_USER: metlab
      DATABASE_PASSWORD: metlab_dev_password
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: metlab-videos
      S3_USE_SSL: "false"
      GRPC_PORT: 50052
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - video_temp:/tmp/video-processing
    networks:
      - metlab-network
    restart: unless-stopped

  # Homework Service
  homework-service:
    build:
      context: .
      dockerfile: infrastructure/docker/homework.Dockerfile
    container_name: metlab-homework
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: metlab
      DATABASE_USER: metlab
      DATABASE_PASSWORD: metlab_dev_password
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: metlab-homework
      S3_USE_SSL: "false"
      GRPC_PORT: 50053
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - metlab-network
    restart: unless-stopped

  # Analytics Service
  analytics-service:
    build:
      context: .
      dockerfile: infrastructure/docker/analytics.Dockerfile
    container_name: metlab-analytics
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: metlab
      DATABASE_USER: metlab
      DATABASE_PASSWORD: metlab_dev_password
      GRPC_PORT: 50054
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metlab-network
    restart: unless-stopped

  # Collaboration Service
  collaboration-service:
    build:
      context: .
      dockerfile: infrastructure/docker/collaboration.Dockerfile
    container_name: metlab-collaboration
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: metlab
      DATABASE_USER: metlab
      DATABASE_PASSWORD: metlab_dev_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GRPC_PORT: 50055
    ports:
      - "50055:50055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - metlab-network
    restart: unless-stopped

  # PDF Service
  pdf-service:
    build:
      context: .
      dockerfile: infrastructure/docker/pdf.Dockerfile
    container_name: metlab-pdf
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: metlab
      DATABASE_USER: metlab
      DATABASE_PASSWORD: metlab_dev_password
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: metlab-pdfs
      S3_USE_SSL: "false"
      GRPC_PORT: 50056
    ports:
      - "50056:50056"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - metlab-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: metlab-frontend
    environment:
      API_URL: http://api-gateway:8080
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - metlab-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  video_temp:
    driver: local

networks:
  metlab-network:
    driver: bridge
