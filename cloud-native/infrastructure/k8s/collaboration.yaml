apiVersion: apps/v1
kind: Deployment
metadata:
  name: collaboration
  namespace: metlab-dev
  labels:
    app: metlab
    service: collaboration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: collaboration
  template:
    metadata:
      labels:
        app: metlab
        service: collaboration
    spec:
      containers:
      - name: collaboration
        image: metlab/collaboration:latest
        ports:
        - containerPort: 50055
          name: grpc
        env:
        - name: PORT
          value: "50055"
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/metlab?sslmode=disable"
        - name: REDIS_URL
          value: "redis:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: collaboration
  namespace: metlab-dev
spec:
  selector:
    app: metlab
    service: collaboration
  ports:
  - port: 50055
    targetPort: 50055
  type: ClusterIP
