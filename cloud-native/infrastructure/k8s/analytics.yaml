apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: metlab-dev
  labels:
    app: metlab
    service: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: analytics
  template:
    metadata:
      labels:
        app: metlab
        service: analytics
    spec:
      containers:
      - name: analytics
        image: metlab/analytics:latest
        ports:
        - containerPort: 50054
          name: grpc
        env:
        - name: PORT
          value: "50054"
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/metlab?sslmode=disable"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: metlab-dev
spec:
  selector:
    app: metlab
    service: analytics
  ports:
  - port: 50054
    targetPort: 50054
  type: ClusterIP
