apiVersion: apps/v1
kind: Deployment
metadata:
  name: video
  namespace: metlab-dev
  labels:
    app: metlab
    service: video
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: video
  template:
    metadata:
      labels:
        app: metlab
        service: video
    spec:
      containers:
      - name: video
        image: metlab/video:latest
        ports:
        - containerPort: 50052
          name: grpc
        env:
        - name: PORT
          value: "50052"
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/metlab?sslmode=disable"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: video
  namespace: metlab-dev
spec:
  selector:
    app: metlab
    service: video
  ports:
  - port: 50052
    targetPort: 50052
  type: ClusterIP
