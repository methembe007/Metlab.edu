apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: metlab-dev
  labels:
    app: metlab
    service: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: api-gateway
  template:
    metadata:
      labels:
        app: metlab
        service: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: metlab/api-gateway:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: AUTH_SERVICE_ADDR
          value: "auth:50051"
        - name: VIDEO_SERVICE_ADDR
          value: "video:50052"
        - name: HOMEWORK_SERVICE_ADDR
          value: "homework:50053"
        - name: ANALYTICS_SERVICE_ADDR
          value: "analytics:50054"
        - name: COLLABORATION_SERVICE_ADDR
          value: "collaboration:50055"
        - name: PDF_SERVICE_ADDR
          value: "pdf:50056"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: metlab-dev
spec:
  selector:
    app: metlab
    service: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
