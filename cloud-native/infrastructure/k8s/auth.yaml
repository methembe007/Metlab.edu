apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: metlab-dev
  labels:
    app: metlab
    service: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: auth
  template:
    metadata:
      labels:
        app: metlab
        service: auth
    spec:
      containers:
      - name: auth
        image: metlab/auth:latest
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: PORT
          value: "50051"
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/metlab?sslmode=disable"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: metlab-dev
spec:
  selector:
    app: metlab
    service: auth
  ports:
  - port: 50051
    targetPort: 50051
  type: ClusterIP
