# ConfigMap for PDF Service configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: pdf-config
  namespace: metlab-dev
  labels:
    app: metlab
    service: pdf
    component: configuration
data:
  PORT: "50056"
  ENV: "development"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_USER: "postgres"
  DATABASE_NAME: "metlab"
  S3_ENDPOINT: "http://minio-service:9000"
  S3_REGION: "us-east-1"
  PDF_BUCKET: "metlab-pdfs"
  MAX_UPLOAD_SIZE_MB: "50"
  SUPPORTED_FORMATS: "pdf"
  DOWNLOAD_URL_EXPIRY_HOURS: "1"

---
# Secret for PDF Service sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: pdf-secret
  namespace: metlab-dev
  labels:
    app: metlab
    service: pdf
    component: configuration
type: Opaque
stringData:
  DATABASE_PASSWORD: "postgres"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"

---
# Deployment for PDF Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf
  namespace: metlab-dev
  labels:
    app: metlab
    service: pdf
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: pdf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: metlab
        service: pdf
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50056"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: pdf
        image: metlab/pdf:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 50056
          protocol: TCP
        env:
        # Configuration from ConfigMap
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: PORT
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: ENV
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: DATABASE_PORT
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: DATABASE_USER
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: DATABASE_NAME
        - name: S3_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: S3_ENDPOINT
        - name: S3_REGION
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: S3_REGION
        - name: PDF_BUCKET
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: PDF_BUCKET
        - name: MAX_UPLOAD_SIZE_MB
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: MAX_UPLOAD_SIZE_MB
        - name: SUPPORTED_FORMATS
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: SUPPORTED_FORMATS
        - name: DOWNLOAD_URL_EXPIRY_HOURS
          valueFrom:
            configMapKeyRef:
              name: pdf-config
              key: DOWNLOAD_URL_EXPIRY_HOURS
        # Secrets
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pdf-secret
              key: DATABASE_PASSWORD
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: pdf-secret
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pdf-secret
              key: S3_SECRET_KEY
        # Computed DATABASE_URL for convenience
        - name: DATABASE_URL
          value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?sslmode=disable"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Health check probes
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "grpc_health_probe -addr=:50056 || exit 0"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "grpc_health_probe -addr=:50056 || exit 0"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        # Security context
        securityContext:
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      # Restart policy
      restartPolicy: Always
      # DNS policy
      dnsPolicy: ClusterFirst
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# Service for PDF Service (internal gRPC communication)
apiVersion: v1
kind: Service
metadata:
  name: pdf
  namespace: metlab-dev
  labels:
    app: metlab
    service: pdf
spec:
  type: ClusterIP
  selector:
    app: metlab
    service: pdf
  ports:
  - name: grpc
    port: 50056
    targetPort: grpc
    protocol: TCP
  sessionAffinity: None

---
# Horizontal Pod Autoscaler for PDF Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pdf-hpa
  namespace: metlab-dev
  labels:
    app: metlab
    service: pdf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pdf
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
