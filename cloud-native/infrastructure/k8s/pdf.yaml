apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf
  namespace: metlab-dev
  labels:
    app: metlab
    service: pdf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metlab
      service: pdf
  template:
    metadata:
      labels:
        app: metlab
        service: pdf
    spec:
      containers:
      - name: pdf
        image: metlab/pdf:latest
        ports:
        - containerPort: 50056
          name: grpc
        env:
        - name: PORT
          value: "50056"
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/metlab?sslmode=disable"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: pdf
  namespace: metlab-dev
spec:
  selector:
    app: metlab
    service: pdf
  ports:
  - port: 50056
    targetPort: 50056
  type: ClusterIP
